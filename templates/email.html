<!DOCTYPE html>
<html>
<head>
    <style>
        .container { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; }
        .item { border-left: 4px solid #0055ff; padding: 15px; margin-bottom: 20px; background: #f9f9f9; }
        .title { font-size: 18px; font-weight: bold; color: #333; text-decoration: none; }
        .meta { font-size: 12px; color: #666; margin-bottom: 10px; }
        .summary { font-size: 14px; color: #444; white-space: pre-wrap; }
        .keyword { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>방송통신위원회 모니터링 결과</h2>
        {% for it in items %}
        <div class="item">
            <a href="{{ it.url }}" class="title">[{{ it.board_name }}] {{ it.title }}</a>
            <div class="meta">작성일: {{ it.date }} | 담당: {{ it.dept }} | 매칭: <span class="keyword">{{ it.matched_keyword }}</span></div>
            <div class="summary">{{ it.summary }}</div>
            {% if it.attachments %}
            <div class="meta">첨부: {{ it.attachments|join(', ') }}</div>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
