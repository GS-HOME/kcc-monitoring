import requests
from bs4 import BeautifulSoup
from urllib.parse import urljoin

def get_post_list(board_name, params):
    posts = []
    try:
        url = params.get('url')
        response = requests.get(url, timeout=10)
        response.raise_for_status()
        soup = BeautifulSoup(response.text, 'html.parser')

        rows = soup.select('table tbody tr')
        for row in rows:
            title_tag = row.select_one('a')
            if title_tag:
                title = title_tag.get_text(strip=True)
                link = urljoin(url, title_tag.get('href', ''))
                date_tag = row.select_one('.date')
                post_date = date_tag.get_text(strip=True) if date_tag else '1970-01-01'

                posts.append({
                    'title': title,
                    'link': link,
                    'date': post_date
                })
    except Exception as e:
        print(f"목록 수집 중 오류 발생: {e}")
    return posts

def get_post_detail(post_info):
    try:
        url = post_info.get('link', '')
        if not url:
            return post_info

        response = requests.get(url, timeout=10)
        response.raise_for_status()
        soup = BeautifulSoup(response.text, 'html.parser')

        attachments = []
        file_elements = soup.select('img, a, span')
        for el in file_elements:
            text = el.get_text(strip=True) or el.get('alt', '')
            if '의사일정' in text:
                attachments.append('의사일정')
            elif '회의록' in text:
                attachments.append('회의록')
            elif '속기록' in text:
                attachments.append('속기록')

        post_info['attachments'] = list(set(attachments))

        content_tag = soup.select_one('.board_article, .content')
        post_info['content'] = content_tag.get_text(strip=True) if content_tag else ""

    except Exception as e:
        print(f"상세 내용 수집 중 오류 발생: {e}")
        post_info['attachments'] = []
        post_info['content'] = ""

    return post_info