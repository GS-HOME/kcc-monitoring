name: KCC RSS Monitoring

on:
  schedule:
    # 한국 시간(KST) 오전 9시 37분 (UTC 00:37) 실행
    - cron: '37 0 * * 1-5'
  workflow_dispatch:

jobs:
  scrape_and_mail:
    runs-on: ubuntu-latest

    steps:
      # 버전 업데이트: v3 -> v4
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 버전 업데이트: v4 -> v5
      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 및 메일 발송 실행
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python -m src.main

      - name: 중복 방지 기록(seen_posts.txt) 자동 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_posts.txt
          git commit -m "chore: 수집된 게시글 해시 업데이트" || echo "변경된 해시 기록이 없습니다."
          git push